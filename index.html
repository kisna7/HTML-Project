<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Web Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background: #333;
            color: white;
            padding: 1rem;
        }
        main {
            padding: 2rem;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        footer {
            margin-top: 2rem;
            padding: 1rem;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<main>
    <h2>Hello World 👋</h2>
    <p>This is a simple index.html example.</p>
    <button onclick="showMessage()">Click Me</button>
</main>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

<script>
    function showMessage() {
        alert("Thanks for clicking!");
    }
</script>

</body>
</html>
